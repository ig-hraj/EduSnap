<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verify Email - EduSnap</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #5BD1D7 0%, #4AB8BE 100%);
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
    }
    .card {
      background: white; border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,0.15);
      max-width: 480px; width: 90%; padding: 50px 40px; text-align: center;
    }
    .icon { font-size: 64px; margin-bottom: 20px; }
    .title { font-size: 24px; font-weight: 700; margin-bottom: 10px; }
    .subtitle { color: #666; font-size: 14px; line-height: 1.6; margin-bottom: 25px; }

    .spinner {
      width: 40px; height: 40px; border: 4px solid #f0f0f0;
      border-top: 4px solid #5BD1D7; border-radius: 50%;
      animation: spin 0.8s linear infinite; margin: 20px auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .btn {
      display: inline-block; padding: 14px 30px; border-radius: 8px;
      font-weight: 600; font-size: 15px; text-decoration: none; cursor: pointer;
      transition: all 0.3s; border: none;
    }
    .btn-primary { background: linear-gradient(135deg, #5BD1D7, #4AB8BE); color: white; }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(91,209,215,0.4); }
    .btn-secondary { background: #f5f5f5; color: #333; }
    .btn-secondary:hover { background: #eee; }
    .btn-group { display: flex; gap: 12px; justify-content: center; margin-top: 20px; flex-wrap: wrap; }

    .success .title { color: #155724; }
    .error .title { color: #c0392b; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <!-- Loading State -->
  <div class="card" id="loadingState">
    <div class="icon">📧</div>
    <div class="title">Verifying Your Email...</div>
    <div class="subtitle">Please wait while we confirm your account.</div>
    <div class="spinner"></div>
  </div>

  <!-- Success State -->
  <div class="card success hidden" id="successState">
    <div class="icon">✅</div>
    <div class="title">Email Verified!</div>
    <div class="subtitle">Your account is now fully activated. You can book sessions, chat with tutors, and more.</div>
    <div class="btn-group">
      <a href="login.html" class="btn btn-primary">Go to Login</a>
      <a href="dashboard.html" class="btn btn-secondary">Go to Dashboard</a>
    </div>
  </div>

  <!-- Error State -->
  <div class="card error hidden" id="errorState">
    <div class="icon">❌</div>
    <div class="title">Verification Failed</div>
    <div class="subtitle" id="errorMessage">The verification link is invalid or has expired.</div>
    <div class="btn-group">
      <button class="btn btn-primary" onclick="resendVerification()">Resend Verification</button>
      <a href="login.html" class="btn btn-secondary">Back to Login</a>
    </div>
  </div>

  <script src="../js/auth.js"></script>
  <script src="../js/theme.js"></script>
  <script>
    window.addEventListener('DOMContentLoaded', async () => {
      const params = new URLSearchParams(window.location.search);
      const token = params.get('token');
      const role = params.get('role');

      if (!token || !role) {
        showError('Missing verification token or role.');
        return;
      }

      try {
        const response = await fetch(`${API_URL}/auth/verify-email?token=${token}&role=${role}`);
        const data = await response.json();

        if (response.ok) {
          showSuccess();
        } else {
          showError(data.message || 'Verification failed.');
        }
      } catch (err) {
        showError('Network error. Please try again.');
      }
    });

    function showSuccess() {
      document.getElementById('loadingState').classList.add('hidden');
      document.getElementById('successState').classList.remove('hidden');
    }

    function showError(msg) {
      document.getElementById('loadingState').classList.add('hidden');
      document.getElementById('errorState').classList.remove('hidden');
      if (msg) document.getElementById('errorMessage').textContent = msg;
    }

    async function resendVerification() {
      const authToken = getAuthToken();
      if (!authToken) {
        alert('Please log in first, then resend verification from your dashboard.');
        window.location.href = 'login.html';
        return;
      }

      try {
        const res = await fetch(`${API_URL}/auth/resend-verification`, {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${authToken}` },
        });
        const data = await res.json();
        alert(data.message || 'Verification email sent! Check your inbox.');
      } catch (err) {
        alert('Failed to resend. Please try again.');
      }
    }
  </script>
</body>
</html>
