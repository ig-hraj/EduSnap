<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - EduSnap</title>
  <link rel="stylesheet" href="../css/design-system.css">
  <style>
    .auth-card { max-width: 480px; max-height: 90vh; overflow-y: auto; }
    .role-selector { display: flex; gap: 12px; margin-bottom: 28px; }
    .role-option {
      flex: 1; padding: 20px 16px; text-align: center;
      background: var(--bg-input); border: 2px solid var(--border);
      border-radius: var(--radius-md); cursor: pointer;
      transition: all var(--transition);
    }
    .role-option:hover { border-color: var(--primary); }
    .role-option.selected {
      border-color: var(--primary); background: rgba(91,209,215,0.08);
      box-shadow: 0 0 20px var(--primary-glow);
    }
    .role-icon { font-size: 28px; margin-bottom: 6px; }
    .role-name { font-weight: 700; font-size: 14px; }
    .role-desc { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
    .form-section { display: none; }
    .form-section.active { display: block; animation: fadeInUp 0.3s ease; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    textarea.form-input { min-height: 80px; resize: vertical; }
    .subjects-tag { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
  </style>
</head>
<body>
  <div class="auth-bg">
    <div class="auth-card animate-in">
      <div class="auth-header">
        <div style="font-size:36px;margin-bottom:12px;">🚀</div>
        <h1>Join EduSnap</h1>
        <p>Start learning or teaching today</p>
      </div>

      <!-- Role Selection -->
      <div class="role-selector">
        <div class="role-option selected" data-role="student">
          <div class="role-icon">🎓</div>
          <div class="role-name">Student</div>
          <div class="role-desc">Find tutors</div>
        </div>
        <div class="role-option" data-role="tutor">
          <div class="role-icon">👨‍🏫</div>
          <div class="role-name">Tutor</div>
          <div class="role-desc">Teach students</div>
        </div>
      </div>

      <div class="error-message" id="errorMessage"></div>
      <div class="success-message" id="successMessage"></div>

      <!-- Student Form -->
      <form id="studentForm" class="form-section active">
        <div class="form-row">
          <div class="form-group">
            <label for="studentFirstName">First Name</label>
            <input type="text" id="studentFirstName" class="form-input" placeholder="John" required>
          </div>
          <div class="form-group">
            <label for="studentLastName">Last Name</label>
            <input type="text" id="studentLastName" class="form-input" placeholder="Doe" required>
          </div>
        </div>
        <div class="form-group">
          <label for="studentEmail">Email</label>
          <input type="email" id="studentEmail" class="form-input" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label for="studentPassword">Password</label>
          <input type="password" id="studentPassword" class="form-input" placeholder="Min 6 characters" minlength="6" required>
        </div>
        <div class="form-group">
          <label for="studentPhone">Phone (Optional)</label>
          <input type="tel" id="studentPhone" class="form-input" placeholder="+91 9876543210">
        </div>
        <div class="form-group">
          <label for="studentSubjects">Subjects of Interest</label>
          <input type="text" id="studentSubjects" class="form-input" placeholder="Math, Physics, Programming">
          <div class="subjects-tag">Comma-separated</div>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%">Create Student Account</button>
      </form>

      <!-- Tutor Form -->
      <form id="tutorForm" class="form-section">
        <div class="form-row">
          <div class="form-group">
            <label for="tutorFirstName">First Name</label>
            <input type="text" id="tutorFirstName" class="form-input" placeholder="Jane" required>
          </div>
          <div class="form-group">
            <label for="tutorLastName">Last Name</label>
            <input type="text" id="tutorLastName" class="form-input" placeholder="Smith" required>
          </div>
        </div>
        <div class="form-group">
          <label for="tutorEmail">Email</label>
          <input type="email" id="tutorEmail" class="form-input" placeholder="tutor@example.com" required>
        </div>
        <div class="form-group">
          <label for="tutorPassword">Password</label>
          <input type="password" id="tutorPassword" class="form-input" placeholder="Min 6 characters" minlength="6" required>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="tutorPhone">Phone</label>
            <input type="tel" id="tutorPhone" class="form-input" placeholder="+91 98765...">
          </div>
          <div class="form-group">
            <label for="tutorHourlyRate">Hourly Rate (₹)</label>
            <input type="number" id="tutorHourlyRate" class="form-input" placeholder="500" min="1" required>
          </div>
        </div>
        <div class="form-group">
          <label for="tutorBio">Professional Bio</label>
          <textarea id="tutorBio" class="form-input" placeholder="Tell students about your experience..."></textarea>
        </div>
        <div class="form-group">
          <label for="tutorSubjects">Subjects You Teach</label>
          <input type="text" id="tutorSubjects" class="form-input" placeholder="Math, Science, English">
          <div class="subjects-tag">Comma-separated</div>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%">Create Tutor Account</button>
      </form>

      <div class="auth-footer">
        Already have an account? <a href="login.html">Sign in</a>
      </div>
    </div>
  </div>

  <script src="../js/auth.js"></script>
  <script src="../js/theme.js"></script>
  <script>
    let selectedRole = 'student';

    document.querySelectorAll('.role-option').forEach(option => {
      option.addEventListener('click', () => {
        document.querySelectorAll('.role-option').forEach(o => o.classList.remove('selected'));
        option.classList.add('selected');
        selectedRole = option.dataset.role;
        document.querySelectorAll('.form-section').forEach(form => form.classList.remove('active'));
        document.getElementById(`${selectedRole}Form`).classList.add('active');
      });
    });

    // Student signup
    document.getElementById('studentForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errorMsg = document.getElementById('errorMessage');
      const successMsg = document.getElementById('successMessage');
      errorMsg.style.display = 'none';
      try {
        const subjects = document.getElementById('studentSubjects').value.split(',').map(s => s.trim());
        const response = await fetch(`${API_URL}/auth/student/signup`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: document.getElementById('studentEmail').value,
            password: document.getElementById('studentPassword').value,
            firstName: document.getElementById('studentFirstName').value,
            lastName: document.getElementById('studentLastName').value,
            phone: document.getElementById('studentPhone').value,
            subjects: subjects.filter(s => s.length > 0),
          }),
        });
        const data = await response.json();
        if (!response.ok) throw new Error(data.message);
        localStorage.setItem('authToken', data.token);
        const role = (data.user?.role || 'student').toLowerCase().trim();
        localStorage.setItem('userRole', role);
        localStorage.setItem('userId', data.user.id);
        localStorage.setItem('firstName', data.user.firstName || '');
        localStorage.setItem('lastName', data.user.lastName || '');
        successMsg.innerHTML = '✅ Account created! Redirecting...';
        successMsg.style.display = 'block';
        setTimeout(() => { window.location.href = 'dashboard.html'; }, 1500);
      } catch (error) {
        errorMsg.textContent = error.message;
        errorMsg.style.display = 'block';
      }
    });

    // Tutor signup
    document.getElementById('tutorForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errorMsg = document.getElementById('errorMessage');
      const successMsg = document.getElementById('successMessage');
      errorMsg.style.display = 'none';
      try {
        const subjects = document.getElementById('tutorSubjects').value.split(',').map(s => s.trim());
        const response = await fetch(`${API_URL}/auth/tutor/signup`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: document.getElementById('tutorEmail').value,
            password: document.getElementById('tutorPassword').value,
            firstName: document.getElementById('tutorFirstName').value,
            lastName: document.getElementById('tutorLastName').value,
            phone: document.getElementById('tutorPhone').value,
            hourlyRate: parseFloat(document.getElementById('tutorHourlyRate').value),
            bio: document.getElementById('tutorBio').value,
            subjects: subjects.filter(s => s.length > 0),
          }),
        });
        const data = await response.json();
        if (!response.ok) throw new Error(data.message);
        localStorage.setItem('authToken', data.token);
        const role = (data.user?.role || 'tutor').toLowerCase().trim();
        localStorage.setItem('userRole', role);
        localStorage.setItem('userId', data.user.id);
        localStorage.setItem('firstName', data.user.firstName || '');
        localStorage.setItem('lastName', data.user.lastName || '');
        successMsg.innerHTML = '✅ Account created! Redirecting...';
        successMsg.style.display = 'block';
        setTimeout(() => { window.location.href = 'dashboard.html'; }, 1500);
      } catch (error) {
        errorMsg.textContent = error.message;
        errorMsg.style.display = 'block';
      }
    });
  </script>
</body>
</html>
