<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment - EduSnap</title>
    <link rel="stylesheet" href="../css/design-system.css">
    <style>
        .payment-container {
            max-width: 560px;
            margin: 40px auto;
            padding: 0;
        }
        .payment-card {
            background: var(--bg-card);
            backdrop-filter: blur(24px);
            border: 1px solid var(--border);
            border-radius: var(--radius-xl);
            padding: 36px;
            box-shadow: var(--shadow-lg);
        }
        .payment-header { text-align: center; margin-bottom: 28px; }
        .payment-header h1 {
            font-size: 24px; font-weight: 800;
            background: var(--gradient);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
            margin: 0 0 6px 0;
        }
        .payment-header p { color: var(--text-muted); font-size: 14px; }
        .booking-summary {
            background: rgba(255,255,255,0.04);
            padding: 20px;
            border-radius: var(--radius-md);
            margin-bottom: 24px;
            border-left: 3px solid var(--primary);
        }
        .summary-row {
            display: flex; justify-content: space-between; padding: 10px 0;
            border-bottom: 1px solid var(--border);
        }
        .summary-row:last-child { border-bottom: none; }
        .summary-label { font-weight: 600; color: var(--text-secondary); font-size: 13px; }
        .summary-value { color: var(--text-primary); font-weight: 600; font-size: 13px; }
        .price-row { margin-top: 8px; padding-top: 12px; border-top: 2px solid rgba(91,209,215,0.3); }
        .price-row .summary-value {
            font-size: 20px; font-weight: 800;
            background: var(--gradient);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .pay-button {
            background: var(--gradient); color: white; border: none;
            padding: 16px 28px; border-radius: var(--radius-md);
            font-size: 15px; font-weight: 700; cursor: pointer; width: 100%;
            margin: 20px 0; font-family: 'Inter', sans-serif;
            transition: all var(--transition);
            box-shadow: 0 8px 25px var(--primary-glow);
        }
        .pay-button:hover { transform: translateY(-2px); box-shadow: 0 12px 35px var(--primary-glow); }
        .pay-button:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }
        .error-message {
            background: rgba(231,76,60,0.1); color: #ff6b6b;
            padding: 14px 16px; border-radius: var(--radius-sm);
            margin: 12px 0; border-left: 3px solid #e74c3c; display: none; font-size: 13px;
        }
        .error-message.show { display: block; }
        .success-message {
            background: rgba(46,204,113,0.1); color: #2ecc71;
            padding: 14px 16px; border-radius: var(--radius-sm);
            margin: 12px 0; border-left: 3px solid #2ecc71; display: none; font-size: 13px;
        }
        .success-message.show { display: block; }
        .loading { display: flex; align-items: center; justify-content: center; gap: 10px; }
        .payment-info {
            background: rgba(91,209,215,0.08); padding: 16px;
            border-radius: var(--radius-sm); margin: 20px 0;
            font-size: 13px; color: var(--primary); line-height: 1.8;
            border: 1px solid rgba(91,209,215,0.15);
        }
        .razorpay-info { text-align: center; margin-top: 20px; color: var(--text-muted); font-size: 12px; }
        .back-link { color: var(--primary); font-weight: 600; cursor: pointer; display: inline-block; margin-bottom: 20px; font-size: 14px; }
        .back-link:hover { text-decoration: underline; }
        @media (max-width: 600px) {
            .payment-container { margin: 16px; }
            .payment-card { padding: 24px; }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <nav class="navbar">
        <div class="navbar-inner">
            <div class="logo" onclick="window.location.href='/'">📚 EduSnap</div>
            <div class="nav-links">
                <a href="dashboard.html">Dashboard</a>
                <a href="booking-history.html">My Bookings</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="payment-container animate-in">
            <div class="payment-card">
                <a class="back-link" onclick="window.history.back()">← Back to Booking</a>

                <div class="payment-header">
                    <div style="font-size:40px;margin-bottom:12px;">💳</div>
                    <h1>Complete Your Payment</h1>
                    <p>Secure payment via Razorpay</p>
                </div>

                <div id="errorMessage" class="error-message"></div>
                <div id="successMessage" class="success-message"></div>

                <div class="booking-summary" id="bookingSummary">
                    <div class="summary-row">
                        <span class="summary-label">Loading...</span>
                    </div>
                </div>

                <div class="payment-info">
                    <p>✓ Secure payment powered by Razorpay</p>
                    <p>✓ Supports: Cards, UPI, Netbanking, Wallets</p>
                    <p>✓ 100% encryption — Your data is safe</p>
                </div>

                <button id="payButton" class="pay-button" onclick="initiatePayment()">
                    <span id="payAmount">₹0</span> — Proceed to Payment
                </button>

                <div class="razorpay-info">
                    <p>Powered by <strong>Razorpay</strong></p>
                </div>
            </div>
        </div>
    </div>

    <!-- Razorpay Script — MUST load before inline code that uses new Razorpay() -->
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/theme.js"></script>
    <script src="../js/notifications.js"></script>

    <script>
        let currentBookingId = null;
        let bookingData = null;

        document.addEventListener('DOMContentLoaded', async () => {
            if (!isLoggedIn()) { logout(); return; }

            const urlParams = new URLSearchParams(window.location.search);
            currentBookingId = urlParams.get('bookingId');

            if (!currentBookingId) {
                showError('Invalid booking ID');
                setTimeout(() => window.history.back(), 2000);
                return;
            }

            await loadBookingDetails();
        });

        async function loadBookingDetails() {
            try {
                const token = getAuthToken();
                const response = await fetch(`/api/bookings/${currentBookingId}`, {
                    headers: { 'Authorization': `Bearer ${token}` },
                });
                if (!response.ok) throw new Error('Failed to load booking');
                const data = await response.json();
                bookingData = data.booking;
                displayBookingSummary();
            } catch (error) {
                showError(error.message);
            }
        }

        function displayBookingSummary() {
            const summary = document.getElementById('bookingSummary');
            summary.innerHTML = `
                <div class="summary-row">
                    <span class="summary-label">Tutor</span>
                    <span class="summary-value">${bookingData.tutorName}</span>
                </div>
                <div class="summary-row">
                    <span class="summary-label">Subject</span>
                    <span class="summary-value">${bookingData.subject}</span>
                </div>
                <div class="summary-row">
                    <span class="summary-label">Date</span>
                    <span class="summary-value">${new Date(bookingData.sessionDate).toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' })}</span>
                </div>
                <div class="summary-row">
                    <span class="summary-label">Time</span>
                    <span class="summary-value">${bookingData.startTime} - ${bookingData.endTime}</span>
                </div>
                <div class="summary-row price-row">
                    <span class="summary-label">Total Amount</span>
                    <span class="summary-value">${formatINR(bookingData.totalPrice)}</span>
                </div>
            `;
            document.getElementById('payAmount').textContent = formatINR(bookingData.totalPrice);
        }

        async function initiatePayment() {
            const payButton = document.getElementById('payButton');
            payButton.disabled = true;
            payButton.innerHTML = '<div class="loading"><span class="spinner"></span> Processing...</div>';

            try {
                console.log('[PAYMENT] Initiating payment for booking:', currentBookingId);
                const token = getAuthToken();
                const orderResponse = await fetch('/api/payments/order', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ bookingId: currentBookingId }),
                });

                if (!orderResponse.ok) {
                    const error = await orderResponse.json();
                    throw new Error(error.message || 'Failed to create payment order');
                }

                const orderData = await orderResponse.json();
                console.log('[PAYMENT] Order created:', { orderId: orderData.orderId, amount: orderData.amount });

                const options = {
                    key: orderData.keyId,
                    amount: orderData.amount,
                    currency: orderData.currency || 'INR',
                    order_id: orderData.orderId,
                    name: 'EduSnap',
                    description: `${bookingData.subject} with ${bookingData.tutorName}`,
                    image: '/images/logo.png',
                    handler: async function (response) {
                        console.log('[PAYMENT] Handler called:', { order_id: response.razorpay_order_id, payment_id: response.razorpay_payment_id });
                        await handlePaymentSuccess(response);
                    },
                    prefill: { email: getUserEmail(), contact: getUserPhone() },
                    theme: { color: '#5BD1D7' },
                    method: { netbanking: true, card: true, upi: true, wallet: true },
                    modal: {
                        ondismiss: function () {
                            console.log('[PAYMENT] Payment modal dismissed');
                            payButton.disabled = false;
                            payButton.innerHTML = `${formatINR(bookingData.totalPrice)} — Proceed to Payment`;
                        }
                    }
                };

                console.log('[PAYMENT] Opening Razorpay checkout');
                const razorpay = new Razorpay(options);
                razorpay.open();

            } catch (error) {
                console.error('[PAYMENT] Error:', error);
                showError(error.message || 'Payment failed. Please try again.');
                payButton.disabled = false;
                payButton.innerHTML = `${formatINR(bookingData.totalPrice)} — Proceed to Payment`;
            }
        }

        async function handlePaymentSuccess(response) {
            const payButton = document.getElementById('payButton');
            payButton.disabled = true;
            payButton.innerHTML = '<div class="loading"><span class="spinner"></span> Verifying Payment...</div>';

            try {
                console.log('[PAYMENT] Verifying payment signature...');
                const token = getAuthToken();
                const verifyResponse = await fetch('/api/payments/verify', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        orderId: response.razorpay_order_id,
                        paymentId: response.razorpay_payment_id,
                        signature: response.razorpay_signature,
                    }),
                });

                if (!verifyResponse.ok) {
                    const error = await verifyResponse.json();
                    throw new Error(error.message || 'Payment verification failed');
                }

                const verifyData = await verifyResponse.json();
                console.log('[PAYMENT] Verified:', verifyData);

                showSuccess('✅ Payment successful! Session confirmed.');
                payButton.innerHTML = '✓ Payment Complete';
                setTimeout(() => { window.location.href = '/pages/dashboard.html'; }, 3000);

            } catch (error) {
                console.error('[PAYMENT] Verification error:', error);
                showError('Payment verification failed: ' + error.message);
                payButton.disabled = false;
                payButton.innerHTML = `${formatINR(bookingData.totalPrice)} — Proceed to Payment`;
            }
        }

        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = '❌ ' + message;
            errorDiv.classList.add('show');
            setTimeout(() => { errorDiv.classList.remove('show'); }, 5000);
        }

        function showSuccess(message) {
            const successDiv = document.getElementById('successMessage');
            successDiv.textContent = message;
            successDiv.classList.add('show');
        }

        function getUserEmail() {
            try {
                const token = getAuthToken();
                const payload = JSON.parse(atob(token.split('.')[1]));
                return payload.email || '';
            } catch (e) { return ''; }
        }

        function getUserPhone() { return ''; }
    </script>
</body>
</html>
