<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Session Chat - EduSnap</title>
    <link rel="stylesheet" href="../css/styles.css">
    <style>
        .chat-container {
            display: flex;
            flex-direction: column;
            height: 90vh;
            background: linear-gradient(135deg, #5BD1D7 0%, #4AB8BE 100%);
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .chat-header {
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid rgba(255, 255, 255, 0.2);
        }

        .chat-header h2 {
            margin: 0;
            font-size: 1.5rem;
        }

        .chat-header-info {
            font-size: 0.9rem;
            opacity: 0.8;
        }

        .close-chat {
            cursor: pointer;
            font-size: 1.5rem;
            padding: 5px 10px;
            transition: opacity 0.3s;
        }

        .close-chat:hover {
            opacity: 0.7;
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            background: rgba(255, 255, 255, 0.95);
        }

        .message {
            display: flex;
            flex-direction: column;
            max-width: 70%;
            animation: slideIn 0.3s ease-out;
        }

        .own-message {
            align-self: flex-end;
            align-items: flex-end;
        }

        .other-message {
            align-self: flex-start;
            align-items: flex-start;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message-header {
            display: flex;
            gap: 8px;
            align-items: center;
            font-size: 0.75rem;
            margin-bottom: 4px;
            color: #666;
        }

        .own-message .message-header {
            justify-content: flex-end;
        }

        .sender-name {
            font-weight: 600;
            color: #333;
        }

        .sender-role {
            font-size: 0.65rem;
            padding: 2px 6px;
            border-radius: 10px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .tutor-role {
            background: #5BD1D7;
            color: white;
        }

        .student-role {
            background: #4AB8BE;
            color: white;
        }

        .message-time {
            font-style: italic;
            opacity: 0.7;
        }

        .message-content {
            padding: 12px 16px;
            border-radius: 12px;
            word-wrap: break-word;
            line-height: 1.4;
        }

        .own-message .message-content {
            background: linear-gradient(135deg, #5BD1D7 0%, #4AB8BE 100%);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .other-message .message-content {
            background: #e8e8e8;
            color: #333;
            border-bottom-left-radius: 4px;
        }

        .unread-indicator {
            font-size: 0.8rem;
            color: #5BD1D7;
            margin-top: 4px;
        }

        .typing-indicator {
            display: flex;
            align-items: center;
            gap: 4px;
            color: #999;
            font-size: 0.85rem;
            font-style: italic;
        }

        .typing-indicator .dots {
            animation: blink 1.4s infinite;
        }

        @keyframes blink {
            0%, 20%, 50%, 80%, 100% {
                opacity: 0.3;
            }
            40% {
                opacity: 1;
            }
            60% {
                opacity: 0.3;
            }
        }

        .messages-loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #999;
        }

        .spinner {
            width: 30px;
            height: 30px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #5BD1D7;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .chat-input-area {
            background: rgba(255, 255, 255, 0.1);
            border-top: 2px solid rgba(255, 255, 255, 0.2);
            padding: 15px;
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        .chat-input-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .chat-input {
            flex: 1;
            padding: 12px 15px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.9);
            color: #333;
            font-size: 0.95rem;
            font-family: inherit;
            resize: none;
            max-height: 100px;
            outline: none;
            transition: background 0.3s;
        }

        .chat-input:focus {
            background: white;
            border-color: #5BD1D7;
        }

        .char-count {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.6);
            margin-top: 4px;
        }

        .send-btn {
            padding: 12px 20px;
            background: linear-gradient(135deg, #5BD1D7 0%, #4AB8BE 100%);
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.2s, opacity 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .send-btn:hover:not(:disabled) {
            transform: scale(1.05);
        }

        .send-btn:active:not(:disabled) {
            transform: scale(0.95);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .send-btn-text {
            display: none;
        }

        .send-btn-icon {
            font-size: 1.2rem;
        }

        @media (max-width: 768px) {
            .message {
                max-width: 85%;
            }

            .chat-container {
                height: 80vh;
            }

            .send-btn-text {
                display: inline;
                margin-left: 5px;
            }

            .send-btn-icon {
                display: none;
            }
        }

        .no-messages {
            text-align: center;
            color: #999;
            font-size: 0.95rem;
            padding: 20px;
        }

        input[type="text"]::-webkit-input-placeholder,
        textarea::-webkit-input-placeholder {
            color: #bbb;
        }

        input[type="text"]:-moz-placeholder,
        textarea:-moz-placeholder {
            color: #bbb;
        }
    </style>
</head>
<body>
    <div class="navbar" style="background:linear-gradient(135deg,#5BD1D7,#4AB8BE);padding:12px 20px;display:flex;justify-content:space-between;align-items:center;">
        <a href="dashboard.html" style="color:white;text-decoration:none;font-size:1.1rem;font-weight:600;">← Back to Dashboard</a>
        <span style="color:rgba(255,255,255,0.8);font-size:0.9rem;">🎓 EduSnap Chat</span>
    </div>

    <div class="container">
        <div class="chat-container">
            <div class="chat-header">
                <div>
                    <h2 id="chatTitle">Chat with Tutor</h2>
                    <div class="chat-header-info" id="chatInfo">Loading...</div>
                </div>
                <div class="close-chat" title="Close Chat" onclick="window.history.back()">✕</div>
            </div>

            <div class="messages-area" id="messagesArea">
                <div class="messages-loading">
                    <div class="spinner"></div>
                    Loading messages...
                </div>
            </div>

            <div class="chat-input-area">
                <div class="chat-input-wrapper">
                    <textarea 
                        id="messageInput" 
                        class="chat-input" 
                        placeholder="Type your message..." 
                        maxlength="1000"
                        rows="1"
                    ></textarea>
                    <div class="char-count"><span id="charCount">0</span>/1000</div>
                </div>
                <button id="sendBtn" class="send-btn" title="Send message">
                    <span class="send-btn-icon">📤</span>
                    <span class="send-btn-text">Send</span>
                </button>
            </div>
        </div>
    </div>

    <script src="../js/auth.js"></script>
    <script src="../js/notifications.js"></script>
    <script src="../js/messages.js"></script>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script src="../js/socket.js"></script>

    <script>
        let currentBookingId = null;
        let currentUserId = null;
        let userRole = null;
        let otherUserName = null;
        let allMessages = [];

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', async () => {
            // Check if user is logged in
            if (!isLoggedIn()) {
                logout();
                return;
            }

            // Get user info (from auth.js localStorage — do NOT redefine)
            currentUserId = getUserId();
            userRole = getUserRole();

            // Get booking ID from URL params
            const urlParams = new URLSearchParams(window.location.search);
            currentBookingId = urlParams.get('bookingId');

            if (!currentBookingId) {
                showError('Invalid Booking', 'No booking ID provided');
                setTimeout(() => window.history.back(), 2000);
                return;
            }

            // Load messages
            await loadMessages();

            // Initialize Socket.IO connection and listeners
            try {
                initSocket();
                // ISSUE 5 FIX: Wait for socket connection before registering listeners
                waitForSocketAndJoin();
            } catch (e) {
                console.warn('Socket.IO init failed (non-blocking):', e.message);
            }

            // Setup input event listeners
            setupInputListeners();

            // ISSUE 3 FIX: Navigation guard — warn if message is being typed
            window.addEventListener('beforeunload', (e) => {
                const input = document.getElementById('messageInput');
                if (input && input.value.trim().length > 0) {
                    e.preventDefault();
                    e.returnValue = 'You have an unsent message. Are you sure you want to leave?';
                }
            });
        });

        /**
         * Load messages from backend
         */
        async function loadMessages() {
            const messagesArea = document.getElementById('messagesArea');
            messagesArea.innerHTML = '<div class="messages-loading"><div class="spinner"></div>Loading messages...</div>';

            const messages = await getMessages(currentBookingId);
            allMessages = messages;

            if (!messages || messages.length === 0) {
                messagesArea.innerHTML = '<div class="no-messages">No messages yet. Start the conversation!</div>';
                updateChatHeader();
                return;
            }

            displayMessages(messages);
            updateChatHeader();

            // Scroll to bottom
            setTimeout(() => {
                messagesArea.scrollTop = messagesArea.scrollHeight;
            }, 100);
        }

        /**
         * Display messages in the chat area
         */
        function displayMessages(messages) {
            const messagesArea = document.getElementById('messagesArea');
            messagesArea.innerHTML = '';

            if (messages.length === 0) {
                messagesArea.innerHTML = '<div class="no-messages">No messages yet. Start the conversation!</div>';
                return;
            }

            messages.forEach((msg) => {
                const messageElement = createMessageElement(msg, currentUserId);
                messagesArea.appendChild(messageElement);

                // Mark as read if not own message
                if (msg.senderId !== currentUserId && !msg.isRead) {
                    markMessageAsRead(msg._id);
                }
            });

            // Scroll to bottom
            messagesArea.scrollTop = messagesArea.scrollHeight;
        }

        /**
         * Setup input listeners
         */
        function setupInputListeners() {
            const messageInput = document.getElementById('messageInput');
            const sendBtn = document.getElementById('sendBtn');
            const charCount = document.getElementById('charCount');

            // Character count
            messageInput.addEventListener('input', (e) => {
                charCount.textContent = e.target.value.length;
            });

            // Auto-resize textarea
            messageInput.addEventListener('input', () => {
                messageInput.style.height = 'auto';
                messageInput.style.height = Math.min(messageInput.scrollHeight, 100) + 'px';
            });

            // Send on Enter (Shift+Enter for multiline)
            messageInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    handleSendMessage();
                }
            });

            // Send button click
            sendBtn.addEventListener('click', handleSendMessage);

            // Emit typing indicator
            let typingTimeout;
            messageInput.addEventListener('input', () => {
                if (window.socket && window.emitTyping) {
                    window.emitTyping(currentBookingId, true);
                }
                clearTimeout(typingTimeout);
                typingTimeout = setTimeout(() => {
                    if (window.socket && window.emitTyping) {
                        window.emitTyping(currentBookingId, false);
                    }
                }, 3000);
            });
        }

        /**
         * Send message — renamed to avoid collision with sendMessage() in messages.js
         */
        async function handleSendMessage() {
            const messageInput = document.getElementById('messageInput');
            const messageText = messageInput.value.trim();

            if (!messageText) {
                showWarning('Empty Message', 'Message cannot be empty');
                return;
            }

            // Disable send button
            const sendBtn = document.getElementById('sendBtn');
            sendBtn.disabled = true;

            // Call the API function from messages.js (not this function!)
            const result = await sendMessageAPI(currentBookingId, messageText);

            if (result) {
                messageInput.value = '';
                messageInput.style.height = 'auto';
                document.getElementById('charCount').textContent = '0';

                // Add message to display (don't wait for socket — show immediately)
                const messageElement = createMessageElement(result, currentUserId);
                document.getElementById('messagesArea').appendChild(messageElement);
                document.getElementById('messagesArea').scrollTop = document.getElementById('messagesArea').scrollHeight;

                // Update local messages
                allMessages.push(result);
            }

            sendBtn.disabled = false;
            messageInput.focus();
        }

        /**
         * ISSUE 5 FIX: Wait for socket connection, then register listeners.
         * Handles both initial connection and reconnections.
         */
        function waitForSocketAndJoin() {
            const sock = getSocket();
            if (!sock) {
                console.warn('Socket not available, retrying in 1s...');
                setTimeout(waitForSocketAndJoin, 1000);
                return;
            }

            if (sock.connected) {
                initializeSocketListeners();
            } else {
                // Socket exists but not connected yet — listen for connect event
                sock.once('connect', () => {
                    console.log('✓ Socket connected, registering chat listeners...');
                    initializeSocketListeners();
                });
            }

            // Re-join room on reconnection
            sock.on('reconnect', () => {
                console.log('🔄 Socket reconnected, re-joining room...');
                sock.emit('join:booking-room', { bookingId: currentBookingId });
            });
        }

        /**
         * Initialize Socket.IO listeners for chat
         */
        function initializeSocketListeners() {
            const sock = getSocket();
            if (!sock) return;

            // Join booking room
            sock.emit('join:booking-room', {
                bookingId: currentBookingId,
            });

            // Listen for new messages — skip own messages to prevent duplicates
            sock.on('message:received', (data) => {
                // Skip if this is our own message (already added via API response)
                if (data.senderId === currentUserId) return;

                // Deduplicate: skip if message already displayed
                if (data._id && allMessages.some(m => m._id === data._id)) return;

                const messageElement = createMessageElement(data, currentUserId);
                const messagesArea = document.getElementById('messagesArea');

                // Remove "no messages" placeholder if present
                const noMsg = messagesArea.querySelector('.no-messages');
                if (noMsg) noMsg.remove();

                messagesArea.appendChild(messageElement);
                messagesArea.scrollTop = messagesArea.scrollHeight;
                allMessages.push(data);

                // Mark as read immediately
                if (data._id) markMessageAsRead(data._id);
            });

            // Listen for typing indicators
            sock.on('message:typing', (data) => {
                if (data.senderId === currentUserId) return;

                const messagesArea = document.getElementById('messagesArea');
                let typingDiv = messagesArea.querySelector('.typing-indicator');

                if (data.isTyping) {
                    if (!typingDiv) {
                        typingDiv = showTypingIndicator(data.senderName);
                        messagesArea.appendChild(typingDiv);
                        messagesArea.scrollTop = messagesArea.scrollHeight;
                    }
                } else {
                    if (typingDiv) {
                        typingDiv.remove();
                    }
                }
            });

            // Listen for message read
            sock.on('message:read', (data) => {
                const messageElement = document.querySelector(`[data-message-id="${data.messageId}"]`);
                if (messageElement) {
                    const unreadIndicator = messageElement.querySelector('.unread-indicator');
                    if (unreadIndicator) {
                        unreadIndicator.remove();
                    }
                }
            });

            // Listen for errors
            sock.on('error:chat', (data) => {
                console.error('Chat socket error:', data.message);
                if (typeof showError === 'function') showError('Chat Error', data.message);
            });
        }

        /**
         * Update chat header with booking info
         */
        async function updateChatHeader() {
            try {
                const response = await apiCall(`/bookings/${currentBookingId}`);

                if (response.ok) {
                    const data = await response.json();
                    const booking = data.booking;

                    // Use tutorName/studentName (full names stored in Booking model)
                    if (userRole === 'student') {
                        otherUserName = booking.tutorName || 'Tutor';
                    } else {
                        otherUserName = booking.studentName || 'Student';
                    }

                    document.getElementById('chatTitle').textContent = `Chat with ${otherUserName}`;
                    document.getElementById('chatInfo').textContent = `${booking.subject} • Session on ${new Date(booking.sessionDate).toLocaleDateString()}`;
                }
            } catch (error) {
                console.error('Error loading booking info:', error);
            }
        }

        // NOTE: getUserId() is already defined correctly in auth.js (reads from localStorage)
        // Do NOT redefine it here — the old version was reading payload.userId from JWT
        // but the JWT actually stores the field as 'id', not 'userId'
    </script>
</body>
</html>
