<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Booking History - EduSnap</title>
  <link rel="stylesheet" href="../css/design-system.css">
  <style>
    .breadcrumb { margin-bottom: 24px; color: var(--text-muted); font-size: 13px; }
    .breadcrumb a { color: var(--primary); }
    .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    .booking-card {
      background: var(--bg-card); backdrop-filter: blur(20px); border: 1px solid var(--border);
      border-radius: var(--radius-md); padding: 20px; margin-bottom: 12px;
      display: grid; grid-template-columns: 1fr auto; gap: 20px; align-items: start; transition: all var(--transition);
    }
    .booking-card:hover { background: var(--bg-card-hover); border-color: rgba(91,209,215,0.15); }
    .booking-header { display: flex; align-items: center; gap: 15px; margin-bottom: 12px; }
    .booking-avatar { font-size: 36px; }
    .booking-title { font-size: 15px; font-weight: 700; }
    .booking-subject { color: var(--primary); font-size: 13px; font-weight: 600; }
    .booking-info { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 12px; margin: 12px 0; }
    .info-item { font-size: 13px; }
    .info-label { color: var(--text-muted); font-weight: 600; text-transform: uppercase; font-size: 10px; letter-spacing: 0.5px; margin-bottom: 4px; }
    .info-value { color: var(--text-primary); font-weight: 600; }
    .status-badge { display: inline-block; padding: 5px 12px; border-radius: 20px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
    .status-pending { background: rgba(243,156,18,0.15); color: #f1c40f; }
    .status-accepted { background: rgba(52,152,219,0.15); color: #3498db; }
    .status-confirmed { background: rgba(46,204,113,0.15); color: #2ecc71; }
    .status-completed { background: rgba(46,204,113,0.15); color: #2ecc71; }
    .status-cancelled { background: rgba(231,76,60,0.15); color: #e74c3c; }
    .status-rejected { background: rgba(149,165,166,0.15); color: #95a5a6; }
    .booking-actions { display: flex; flex-direction: column; gap: 8px; }
    .action-btn {
      padding: 8px 16px; border: 1px solid var(--border); border-radius: var(--radius-sm);
      background: var(--bg-card); color: var(--text-secondary); font-size: 13px; font-weight: 600;
      cursor: pointer; transition: all var(--transition); white-space: nowrap; font-family: 'Inter', sans-serif;
    }
    .action-btn:hover { border-color: var(--primary); color: var(--text-primary); }
    .action-btn.primary { background: var(--gradient); color: white; border: none; box-shadow: 0 4px 12px var(--primary-glow); }
    .action-btn.primary:hover { transform: translateY(-2px); }
    .action-btn.danger { color: #e74c3c; border-color: rgba(231,76,60,0.3); }
    .action-btn.danger:hover { background: rgba(231,76,60,0.1); }
    .empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
    .empty-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.5; }
    .empty-text { font-size: 16px; font-weight: 600; color: var(--text-secondary); margin-bottom: 8px; }
    .empty-subtext { font-size: 13px; color: var(--text-muted); }
    .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); z-index: 1000; align-items: center; justify-content: center; }
    .modal.active { display: flex; }
    .modal-content { background: var(--bg-surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 30px; max-width: 420px; width: 90%; box-shadow: var(--shadow-lg); }
    .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 16px; color: var(--text-primary); }
    .modal-body { margin-bottom: 16px; }
    .modal-body p { color: var(--text-secondary); font-size: 14px; }
    .modal-form-group { margin-bottom: 16px; }
    .modal-form-group label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
    .modal-form-group input, .modal-form-group textarea, .modal-form-group select {
      width: 100%; padding: 12px; background: var(--bg-input); border: 1px solid var(--border);
      border-radius: var(--radius-sm); font-size: 13px; font-family: 'Inter', sans-serif; color: var(--text-primary);
    }
    .modal-form-group input:focus, .modal-form-group textarea:focus { outline: none; border-color: var(--border-focus); box-shadow: 0 0 0 3px var(--primary-glow); }
    .modal-form-group textarea { min-height: 80px; resize: vertical; }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }
    .modal-btn { padding: 10px 18px; border: none; border-radius: var(--radius-sm); font-size: 13px; font-weight: 600; cursor: pointer; transition: all var(--transition); font-family: 'Inter', sans-serif; }
    .modal-btn.cancel { background: var(--bg-card); color: var(--text-secondary); border: 1px solid var(--border); }
    .modal-btn.cancel:hover { border-color: var(--primary); }
    .modal-btn.confirm { background: var(--gradient); color: white; }
    .modal-btn.confirm:hover { transform: translateY(-2px); box-shadow: 0 4px 12px var(--primary-glow); }
    .star-rating { display: flex; gap: 8px; font-size: 24px; }
    .star { cursor: pointer; color: var(--text-muted); transition: color 0.2s; }
    .star.active, .star:hover { color: #ffc107; }
    .message { padding: 12px; border-radius: var(--radius-sm); margin-bottom: 12px; display: none; font-size: 13px; }
    .message.success { background: rgba(46,204,113,0.1); color: #2ecc71; border: 1px solid rgba(46,204,113,0.2); display: block; }
    .message.error { background: rgba(231,76,60,0.1); color: #e74c3c; border: 1px solid rgba(231,76,60,0.2); display: block; }
    .theme-toggle {
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 50%;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 20px;
      transition: all var(--transition);
      margin-right: 12px;
    }
    .theme-toggle:hover {
      background: var(--bg-card-hover);
      border-color: var(--primary);
      transform: rotate(20deg);
    }
    @media (max-width: 768px) {
      .booking-card { grid-template-columns: 1fr; }
      .page-header { flex-direction: column; align-items: flex-start; gap: 12px; }
      .booking-info { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
  <!-- Header -->
  <nav class="navbar">
    <div class="navbar-inner">
      <div class="logo" onclick="window.location.href='/'">📚 EduSnap</div>
      <div class="nav-links">
        <a href="dashboard.html">Dashboard</a>
        <a href="tutor-list.html" id="findTutorsLink">Find Tutors</a>
        <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="Toggle dark/light mode">🌙</button>
        <button class="btn-logout" onclick="logout()">Logout</button>
      </div>
    </div>
  </nav>

  <!-- Container -->
  <div class="container">
    <!-- Breadcrumb -->
    <div class="breadcrumb">
      <a href="/">Home</a> / <a href="dashboard.html">Dashboard</a> / <span>My Bookings</span>
    </div>

    <!-- Page Header -->
    <div class="page-header animate-in">
      <div class="page-title">My Bookings</div>
    </div>

    <!-- Tabs -->
    <div class="tabs animate-in animate-in-1">
      <button class="tab-btn active" onclick="switchTab('pending')">⏳ Pending</button>
      <button class="tab-btn" onclick="switchTab('upcoming')">📅 Upcoming</button>
      <button class="tab-btn" onclick="switchTab('completed')">✓ Completed</button>
      <button class="tab-btn" onclick="switchTab('cancelled')">✗ Cancelled</button>
    </div>

    <!-- Pending Bookings -->
    <div id="pendingTab" class="tab-content">
      <div id="pendingBookings"></div>
    </div>

    <!-- Upcoming Bookings -->
    <div id="upcomingTab" class="tab-content" style="display: none;">
      <div id="upcomingBookings"></div>
    </div>

    <!-- Completed Bookings -->
    <div id="completedTab" class="tab-content" style="display: none;">
      <div id="completedBookings"></div>
    </div>

    <!-- Cancelled Bookings -->
    <div id="cancelledTab" class="tab-content" style="display: none;">
      <div id="cancelledBookings"></div>
    </div>
  </div>

  <!-- Cancel Modal -->
  <div id="cancelModal" class="modal">
    <div class="modal-content">
      <div class="modal-title">Cancel Booking</div>
      <div class="modal-body">
        <p>Are you sure you want to cancel this booking? Please provide a reason.</p>
      </div>
      <div class="modal-form-group">
        <label for="cancelReason">Reason for Cancellation</label>
        <textarea id="cancelReason" placeholder="Tell the tutor why you're cancelling..."></textarea>
      </div>
      <div id="cancelMessage" class="message"></div>
      <div class="modal-actions">
        <button class="modal-btn cancel" onclick="closeModal('cancelModal')">Keep Booking</button>
        <button class="modal-btn confirm" onclick="confirmCancel()">Cancel Booking</button>
      </div>
    </div>
  </div>

  <!-- Feedback Modal -->
  <div id="feedbackModal" class="modal">
    <div class="modal-content">
      <div class="modal-title">Rate Your Tutor</div>
      <div class="modal-body">
        <p style="margin-bottom: 15px;">How was your session with <strong id="feedbackTutorName">-</strong>?</p>
        <div class="modal-form-group">
          <label>Rating</label>
          <div class="star-rating" id="starRating">
            <span class="star" onclick="setRating(1)">☆</span>
            <span class="star" onclick="setRating(2)">☆</span>
            <span class="star" onclick="setRating(3)">☆</span>
            <span class="star" onclick="setRating(4)">☆</span>
            <span class="star" onclick="setRating(5)">☆</span>
          </div>
        </div>
      </div>
      <div class="modal-form-group">
        <label for="feedbackText">Your Feedback</label>
        <textarea id="feedbackText" placeholder="Share your experience with this tutor..."></textarea>
      </div>
      <div id="feedbackMessage" class="message"></div>
      <div class="modal-actions">
        <button class="modal-btn cancel" onclick="closeModal('feedbackModal')">Skip</button>
        <button class="modal-btn confirm" onclick="submitFeedback()">Submit Feedback</button>
      </div>
    </div>
  </div>

  <script src="../js/auth.js"></script>
  <script src="../js/theme.js"></script>
  <script src="../js/bookings.js"></script>
  <script src="../js/notifications.js"></script>
  <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
  <script src="../js/socket.js"></script>
  <script>
    let currentBookingId = null;
    let currentRating = 0;
    let bookings = [];

    window.addEventListener('DOMContentLoaded', async () => {
      requireAuth();
      
      // ISSUE 2 FIX: Hide student-only nav for tutors
      if (getUserRole() === 'tutor') {
        const findTutorsLink = document.getElementById('findTutorsLink');
        if (findTutorsLink) findTutorsLink.style.display = 'none';
      }

      await loadBookings();
      
      // Initialize Socket.IO
      setTimeout(() => {
        initSocket();
        setupHistorySocketListeners();
      }, 500);
    });

    async function loadBookings() {
      try {
        const response = await getMyBookings();
        bookings = response.bookings || [];
        renderBookings();
      } catch (error) {
        console.error('Error loading bookings:', error);
      }
    }

    function renderBookings() {
      const now = new Date();
      const role = getUserRole();

      const pending = bookings.filter(b => b.status === 'pending');
      const accepted = bookings.filter(b => b.status === 'accepted');
      const upcoming = bookings.filter(b => {
        if (!['accepted', 'confirmed'].includes(b.status)) return false;
        const sessionDateTime = new Date(b.sessionDate);
        if (b.endTime) {
          const [h, m] = b.endTime.split(':').map(Number);
          sessionDateTime.setHours(h, m, 0, 0);
        }
        return sessionDateTime > now;
      });

      const pastConfirmed = bookings.filter(b => {
        if (!['accepted', 'confirmed'].includes(b.status)) return false;
        const sessionDateTime = new Date(b.sessionDate);
        if (b.endTime) {
          const [h, m] = b.endTime.split(':').map(Number);
          sessionDateTime.setHours(h, m, 0, 0);
        }
        return sessionDateTime <= now;
      });

      const completed = bookings.filter(b => b.status === 'completed').concat(pastConfirmed);
      const cancelled = bookings.filter(b => ['cancelled', 'rejected'].includes(b.status));

      renderBookingList('pendingBookings', pending.concat(accepted));
      renderBookingList('upcomingBookings', upcoming);
      renderBookingList('completedBookings', completed);
      renderBookingList('cancelledBookings', cancelled);

      const pendingCount = pending.length + accepted.length;
      const pendingTab = document.querySelector('.tab-btn');
      if (pendingCount > 0) {
        pendingTab.innerHTML = `⏳ Pending (${pendingCount})`;
      }
    }

    function renderBookingList(containerId, bookings) {
      const container = document.getElementById(containerId);
      const role = getUserRole();
      const now = new Date();

      if (bookings.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">📭</div>
            <div class="empty-text">No bookings here</div>
            <div class="empty-subtext">${role === 'student' ? 'Book a session to get started' : 'Sessions will appear here when students book you'}</div>
          </div>
        `;
        return;
      }

      container.innerHTML = bookings.map(booking => {
        const displayName = role === 'tutor' ? booking.studentName : booking.tutorName;
        const avatarEmoji = role === 'tutor' ? '👨‍🎓' : '👨‍🏫';
        const sessionEndTime = new Date(booking.sessionDate);
        if (booking.endTime) {
          const [hours, minutes] = booking.endTime.split(':').map(Number);
          sessionEndTime.setHours(hours, minutes, 0, 0);
        }
        const hasSessionEnded = sessionEndTime <= now;
        const isEffectivelyCompleted =
          booking.status === 'completed' ||
          (['accepted', 'confirmed'].includes(booking.status) && hasSessionEnded);
        const displayStatus = isEffectivelyCompleted ? 'completed' : booking.status;

        let actions = '';

        if (booking.status === 'pending' && role === 'tutor') {
          actions += `
            <button class="action-btn primary" onclick="acceptBooking('${booking._id}')">✅ Accept</button>
            <button class="action-btn danger" onclick="rejectBooking('${booking._id}')">✗ Reject</button>
          `;
        }

        if (booking.status === 'pending' && role === 'student') {
          actions += `<div style="font-size:12px;color:#f39c12;font-weight:600;padding:8px;">⏳ Waiting for tutor approval</div>`;
          actions += `<button class="action-btn danger" onclick="openCancelModal('${booking._id}')">Cancel Request</button>`;
        }

        if (booking.status === 'accepted' && booking.paymentStatus !== 'paid' && role === 'student') {
          actions += `
            <div style="font-size:12px;color:#27ae60;font-weight:600;padding:4px 8px;">✅ Session Approved</div>
            <a href="payment.html?bookingId=${booking._id}" style="text-decoration:none">
              <button class="action-btn primary">💳 Pay Now — ${formatINR(booking.totalPrice)}</button>
            </a>
          `;
        }

        if (!['cancelled', 'rejected', 'pending'].includes(booking.status)) {
          actions += `<button class="action-btn" onclick="openChat('${booking._id}')" style="background:var(--gradient);color:white;border:none;">💬 Chat</button>`;
        }

        if (['confirmed', 'accepted'].includes(booking.status) && !hasSessionEnded) {
          actions += `<button class="action-btn danger" onclick="openCancelModal('${booking._id}')">Cancel</button>`;
        }

        if (isEffectivelyCompleted && !booking.rating && role === 'student') {
          actions += `<button class="action-btn primary" onclick="openFeedbackModal('${booking._id}', '${booking.tutorName}')">Leave Feedback</button>`;
        }

        if (booking.rating) {
          actions += `<div style="font-size:12px;color:var(--primary);font-weight:600;padding:8px;">⭐ ${booking.rating}/5 - Feedback given</div>`;
        }

        if (booking.status === 'rejected') {
          actions += `<div style="font-size:12px;color:var(--text-muted);padding:8px;">Reason: ${booking.rejectionReason || 'No reason given'}</div>`;
        }

        return `
        <div class="booking-card">
          <div>
            <div class="booking-header">
              <div class="booking-avatar">${avatarEmoji}</div>
              <div>
                <div class="booking-title">${displayName}</div>
                <div class="booking-subject">${booking.subject}</div>
              </div>
              <span class="status-badge status-${displayStatus.toLowerCase()}">${getStatusText(displayStatus)}</span>
            </div>
            <div class="booking-info">
              <div class="info-item">
                <div class="info-label">📅 Date</div>
                <div class="info-value">${formatDate(booking.sessionDate)}</div>
              </div>
              <div class="info-item">
                <div class="info-label">🕐 Time</div>
                <div class="info-value">${formatTime(booking.startTime)} - ${formatTime(booking.endTime)}</div>
              </div>
              <div class="info-item">
                <div class="info-label">⏱️ Duration</div>
                <div class="info-value">${calculateDuration(booking.startTime, booking.endTime).toFixed(1)} hrs</div>
              </div>
              <div class="info-item">
                <div class="info-label">💰 Price</div>
                <div class="info-value">${formatINR(booking.totalPrice)}</div>
              </div>
            </div>
            ${booking.notes ? `<div style="color: var(--text-muted); font-size: 13px; margin-top: 10px;">📝 Notes: ${booking.notes}</div>` : ''}
          </div>
          <div class="booking-actions">
            ${actions}
          </div>
        </div>
      `}).join('');
    }

    function switchTab(tab) {
      document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.getElementById(tab + 'Tab').style.display = 'block';
      event.target.classList.add('active');
    }

    async function acceptBooking(bookingId) {
      if (!confirm('Accept this session request?')) return;
      try {
        const token = localStorage.getItem('authToken');
        const res = await fetch(`${API_URL}/bookings/${bookingId}/accept`, {
          method: 'PATCH',
          headers: { 'Authorization': `Bearer ${token}` },
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.message);
        alert('✅ ' + data.message);
        loadBookings();
      } catch (err) {
        alert('❌ ' + err.message);
      }
    }

    async function rejectBooking(bookingId) {
      const reason = prompt('Reason for declining (optional):');
      if (reason === null) return;
      try {
        const token = localStorage.getItem('authToken');
        const res = await fetch(`${API_URL}/bookings/${bookingId}/reject`, {
          method: 'PATCH',
          headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
          body: JSON.stringify({ reason }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.message);
        alert(data.message);
        loadBookings();
      } catch (err) {
        alert('❌ ' + err.message);
      }
    }

    function openChat(bookingId) {
      window.location.href = `chat.html?bookingId=${bookingId}`;
    }

    function openCancelModal(bookingId) {
      currentBookingId = bookingId;
      document.getElementById('cancelReason').value = '';
      document.getElementById('cancelMessage').classList.remove('success', 'error');
      document.getElementById('cancelMessage').textContent = '';
      openModal('cancelModal');
    }

    async function confirmCancel() {
      const reason = document.getElementById('cancelReason').value;
      const msgDiv = document.getElementById('cancelMessage');
      if (!reason.trim()) {
        msgDiv.classList.remove('success');
        msgDiv.classList.add('error');
        msgDiv.textContent = '✗ Please provide a reason for cancellation';
        return;
      }
      try {
        await cancelBooking(currentBookingId, reason);
        msgDiv.classList.remove('error');
        msgDiv.classList.add('success');
        msgDiv.textContent = '✓ Booking cancelled successfully';
        setTimeout(() => { closeModal('cancelModal'); loadBookings(); }, 1500);
      } catch (error) {
        msgDiv.classList.remove('success');
        msgDiv.classList.add('error');
        msgDiv.textContent = '✗ ' + error.message;
      }
    }

    function openFeedbackModal(bookingId, tutorName) {
      currentBookingId = bookingId;
      currentRating = 0;
      document.getElementById('feedbackTutorName').textContent = tutorName;
      document.getElementById('feedbackText').value = '';
      document.querySelectorAll('#starRating .star').forEach(s => {
        s.classList.remove('active');
        s.textContent = '☆';
      });
      document.getElementById('feedbackMessage').classList.remove('success', 'error');
      document.getElementById('feedbackMessage').textContent = '';
      openModal('feedbackModal');
    }

    function setRating(rating) {
      currentRating = rating;
      document.querySelectorAll('#starRating .star').forEach((star, idx) => {
        if (idx < rating) {
          star.classList.add('active');
          star.textContent = '★';
        } else {
          star.classList.remove('active');
          star.textContent = '☆';
        }
      });
    }

    async function submitFeedback() {
      const feedback = document.getElementById('feedbackText').value;
      const msgDiv = document.getElementById('feedbackMessage');
      if (currentRating === 0) {
        msgDiv.classList.remove('success');
        msgDiv.classList.add('error');
        msgDiv.textContent = '✗ Please select a star rating';
        return;
      }
      try {
        await addFeedback(currentBookingId, currentRating, feedback);
        msgDiv.classList.remove('error');
        msgDiv.classList.add('success');
        msgDiv.textContent = '✓ Thank you for your feedback!';
        setTimeout(() => { closeModal('feedbackModal'); loadBookings(); }, 1500);
      } catch (error) {
        msgDiv.classList.remove('success');
        msgDiv.classList.add('error');
        msgDiv.textContent = '✗ ' + error.message;
      }
    }

    function openModal(modalId) {
      document.getElementById(modalId).classList.add('active');
    }

    function closeModal(modalId) {
      document.getElementById(modalId).classList.remove('active');
    }

    document.querySelectorAll('.modal').forEach(modal => {
      modal.addEventListener('click', (e) => {
        if (e.target === modal) modal.classList.remove('active');
      });
    });

    function setupHistorySocketListeners() {
      onSocket('booking:status-changed', (data) => {
        console.log('🔄 Booking status changed:', data);
        showInfo('Session Update', 'A booking status has been updated');
        loadBookings();
      });
      onSocket('dashboard:updated', (data) => {
        console.log('📊 Dashboard updated:', data);
        loadBookings();
      });
      onSocket('dashboard:booking-cancelled', (data) => {
        console.log('❌ Booking cancelled:', data);
        loadBookings();
      });
      onSocket('notification:received', (notification) => {
        console.log('🔔 Notification:', notification);
      });
    }
  </script>
</body>
</html>
