<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - EduSnap</title>
  <link rel="stylesheet" href="../css/design-system.css">
</head>
<body>
  <div class="auth-bg">
    <div class="auth-card animate-in">
      <div class="auth-header">
        <div style="font-size:36px;margin-bottom:12px;">📚</div>
        <h1>Welcome Back</h1>
        <p>Sign in to your EduSnap account</p>
      </div>

      <div class="role-tabs">
        <button type="button" class="role-tab active" data-role="student">🎓 Student</button>
        <button type="button" class="role-tab" data-role="tutor">👨‍🏫 Tutor</button>
      </div>

      <form id="loginForm">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" class="form-input" placeholder="you@example.com" required>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" class="form-input" placeholder="••••••••" required>
        </div>

        <div class="error-message" id="errorMessage"></div>
        <div class="success-message" id="successMessage"></div>

        <button type="submit" class="btn btn-primary" id="loginBtn" style="width:100%;margin-top:8px;">Sign In</button>
      </form>

      <div class="auth-footer">
        Don't have an account? <a href="signup.html">Create one</a>
      </div>
    </div>
  </div>

  <script src="../js/auth.js"></script>
  <script src="../js/theme.js"></script>
  <script>
    let selectedRole = 'student';

    document.querySelectorAll('.role-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.role-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        selectedRole = tab.dataset.role;
      });
    });

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const errorMsg = document.getElementById('errorMessage');
      const successMsg = document.getElementById('successMessage');
      const loginBtn = document.getElementById('loginBtn');

      errorMsg.style.display = 'none';
      successMsg.style.display = 'none';

      try {
        loginBtn.disabled = true;
        loginBtn.innerHTML = '<span class="spinner"></span> Signing in...';

        const response = await fetch(`${API_URL}/auth/${selectedRole}/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });

        const data = await response.json();
        if (!response.ok) throw new Error(data.message || 'Login failed');

        localStorage.setItem('authToken', data.token);
        const role = (data.user?.role || selectedRole || '').toLowerCase().trim();
        localStorage.setItem('userRole', role);
        localStorage.setItem('userId', data.user.id);
        localStorage.setItem('firstName', data.user.firstName || '');
        localStorage.setItem('lastName', data.user.lastName || '');

        successMsg.textContent = '✅ Login successful! Redirecting...';
        successMsg.style.display = 'block';
        loginBtn.innerHTML = '✓ Success';

        setTimeout(() => { window.location.href = 'dashboard.html'; }, 1200);
      } catch (error) {
        errorMsg.textContent = error.message;
        errorMsg.style.display = 'block';
        loginBtn.disabled = false;
        loginBtn.textContent = 'Sign In';
      }
    });
  </script>
</body>
</html>
