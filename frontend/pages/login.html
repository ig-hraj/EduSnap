<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - EduSnap</title>
  <link rel="stylesheet" href="../assets/css/style.css">
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #5BD1D7 0%, #4AB8BE 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0;
    }

    .auth-container {
      background: white;
      padding: 40px;
      border-radius: 10px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
      width: 100%;
      max-width: 400px;
    }

    .auth-header {
      text-align: center;
      margin-bottom: 30px;
    }

    .auth-header h1 {
      color: #333;
      margin: 0;
      font-size: 28px;
    }

    .auth-header p {
      color: #666;
      margin: 10px 0 0 0;
      font-size: 14px;
    }

    .role-tabs {
      display: flex;
      margin-bottom: 30px;
      gap: 10px;
    }

    .role-tab {
      flex: 1;
      padding: 12px;
      border: 2px solid #ddd;
      background: white;
      cursor: pointer;
      border-radius: 5px;
      font-size: 14px;
      font-weight: 600;
      transition: all 0.3s;
      color: #666;
    }

    .role-tab.active {
      border-color: #5BD1D7;
      background: #5BD1D7;
      color: white;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: #333;
      font-weight: 500;
      font-size: 14px;
    }

    .form-group input {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 5px;
      font-size: 14px;
      box-sizing: border-box;
    }

    .form-group input:focus {
      outline: none;
      border-color: #5BD1D7;
      box-shadow: 0 0 5px rgba(102, 126, 234, 0.1);
    }

    .btn-login {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #5BD1D7 0%, #4AB8BE 100%);
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .btn-login:hover {
      transform: translateY(-2px);
    }

    .btn-login:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .form-footer {
      text-align: center;
      margin-top: 20px;
      font-size: 14px;
      color: #666;
    }

    .form-footer a {
      color: #5BD1D7;
      text-decoration: none;
      font-weight: 600;
    }

    .form-footer a:hover {
      text-decoration: underline;
    }

    .error-message {
      color: #e74c3c;
      font-size: 14px;
      margin-top: 10px;
      padding: 10px;
      background: #fadbd8;
      border-radius: 5px;
      display: none;
    }

    .success-message {
      color: #27ae60;
      font-size: 14px;
      margin-top: 10px;
      padding: 10px;
      background: #d5f4e6;
      border-radius: 5px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="auth-container">
    <div class="auth-header">
      <h1>Welcome Back!</h1>
      <p>Login to EduSnap</p>
    </div>

    <div class="role-tabs">
      <button type="button" class="role-tab active" data-role="student">Student</button>
      <button type="button" class="role-tab" data-role="tutor">Tutor</button>
    </div>

    <form id="loginForm">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="your@email.com" required>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" required>
      </div>

      <div class="error-message" id="errorMessage"></div>
      <div class="success-message" id="successMessage"></div>

      <button type="submit" class="btn-login" id="loginBtn">Login</button>
    </form>

    <div class="form-footer">
      Don't have an account? <a href="signup.html">Sign up here</a>
    </div>
  </div>

  <script src="../js/auth.js"></script>
  <script>
    let selectedRole = 'student'; // Default role

    // Role tab selection
    document.querySelectorAll('.role-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.role-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        selectedRole = tab.dataset.role;
      });
    });

    // Form submission
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const errorMsg = document.getElementById('errorMessage');
      const successMsg = document.getElementById('successMessage');
      const loginBtn = document.getElementById('loginBtn');

      // Clear messages
      errorMsg.style.display = 'none';
      successMsg.style.display = 'none';

      try {
        loginBtn.disabled = true;
        loginBtn.textContent = 'Logging in...';

        const response = await fetch(`${API_URL}/auth/${selectedRole}/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.message || 'Login failed');
        }

        // Save token to localStorage — use backend response role (not form selection)
        localStorage.setItem('authToken', data.token);
        localStorage.setItem('userRole', data.user.role || selectedRole);
        localStorage.setItem('userId', data.user.id);
        localStorage.setItem('firstName', data.user.firstName || '');
        localStorage.setItem('lastName', data.user.lastName || '');

        successMsg.textContent = 'Login successful! Redirecting...';
        successMsg.style.display = 'block';

        setTimeout(() => {
          window.location.href = 'dashboard.html';
        }, 1500);
      } catch (error) {
        errorMsg.textContent = error.message;
        errorMsg.style.display = 'block';
        loginBtn.disabled = false;
        loginBtn.textContent = 'Login';
      }
    });
  </script>
</body>
</html>
